<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruscotto — Sacra Famiglia</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
    <style>
        :root {
            --bg: #f0f4ff;
            --bg-white: #ffffff;
            --text-dark: #2d3047;
            --text-medium: #5a5f7d;
            --text-light: #8b90a8;
            --shadow-soft: 0 2px 16px rgba(45,48,71,0.06);
            --shadow-card: 0 4px 24px rgba(45,48,71,0.08);
            --shadow-hover: 0 12px 40px rgba(45,48,71,0.14);
            --radius: 20px;
            --radius-sm: 14px;
            --accent: #5d6e3b;
            --accent-light: #f2f5ec;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }

        /* ═══ HERO ═══ */
        .hero {
            background: linear-gradient(135deg, #6b7c3e 0%, #1a535c 50%, #2d3047 100%);
            position: relative; padding: 2rem 2rem 3rem; overflow: hidden; color: #fff;
        }
        .hero-shapes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .hero-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
            25% { transform: translate(20px,-15px) rotate(5deg); }
            50% { transform: translate(-10px,20px) rotate(-3deg); }
            75% { transform: translate(15px,10px) rotate(4deg); }
        }
        .hero-content { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .hero-left { display: flex; align-items: stretch; gap: 1rem; }
        .hero-icon { width: 80px; height: 80px; border-radius: 18px; background: rgba(255,255,255,0.25); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid rgba(255,255,255,0.3); animation: logoPopIn 0.6s cubic-bezier(0.175,0.885,0.32,1.275) both; flex-shrink: 0; }
        @keyframes logoPopIn { from { opacity:0; transform:scale(0.5) rotate(-10deg); } to { opacity:1; transform:scale(1) rotate(0); } }
        .hero-text { display: flex; flex-direction: column; justify-content: center; }
        .hero-text h1 { font-family: 'DM Sans', sans-serif; font-size: 2.6rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; text-shadow: 0 2px 12px rgba(0,0,0,0.15); animation: fadeUp .7s cubic-bezier(.16,1,.3,1) .1s both; }
        .hero-text p { font-size: 1rem; opacity: .85; font-weight: 600; margin-top: .15rem; animation: fadeUp .7s cubic-bezier(.16,1,.3,1) .2s both; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .back-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; gap: .45rem; padding: .55rem 1.1rem; border-radius: 50px; text-decoration: none; font-family: 'Nunito'; font-size: .82rem; font-weight: 700; background: rgba(255,255,255,.2); color: #fff; border: 1.5px solid rgba(255,255,255,.3); backdrop-filter: blur(8px); transition: all .3s cubic-bezier(.16,1,.3,1); white-space: nowrap; animation: fadeUp .7s cubic-bezier(.16,1,.3,1) .3s both; }
        .back-btn:hover { background: #fff; color: #5d6e3b; transform: translateY(-50%) translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.15); }

        /* ═══ LOGIN SCREEN ═══ */
        .login-wrap {
            max-width: 420px; margin: 3rem auto; padding: 0 2rem;
            animation: fadeUp .7s cubic-bezier(.16,1,.3,1) .3s both;
        }
        .login-card {
            background: var(--bg-white); border-radius: var(--radius);
            padding: 2.5rem 2rem; box-shadow: var(--shadow-card);
            text-align: center;
        }
        .login-lock {
            width: 64px; height: 64px; border-radius: 18px;
            background: var(--accent-light); margin: 0 auto 1.2rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
        }
        .login-card h2 {
            font-family: 'DM Sans', sans-serif; font-size: 1.3rem;
            font-weight: 800; margin-bottom: .3rem;
        }
        .login-card p {
            font-size: .85rem; color: var(--text-medium); font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .login-field {
            display: flex; gap: .5rem; margin-bottom: .8rem;
        }
        .login-field input {
            flex: 1; padding: .7rem 1rem; border-radius: 12px;
            border: 2px solid #e2e8f0; font-family: 'Nunito';
            font-size: .9rem; font-weight: 600; color: var(--text-dark);
            outline: none; transition: border-color .25s ease;
        }
        .login-field input:focus { border-color: var(--accent); }
        .login-field button {
            padding: .7rem 1.2rem; border-radius: 12px; border: none;
            background: var(--accent); color: #fff;
            font-family: 'Nunito'; font-size: .85rem; font-weight: 700;
            cursor: pointer; transition: all .25s ease; white-space: nowrap;
        }
        .login-field button:hover { background: #4a5c2e; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(93,110,59,.3); }
        .login-error {
            font-size: .8rem; font-weight: 700; color: #ef4444;
            min-height: 1.2rem; margin-top: .3rem;
        }

        /* ═══ CONTENT (hidden until login) ═══ */
        .content-wrap {
            max-width: 1100px; margin: 2rem auto; padding: 0 2rem 3rem;
            display: none;
            animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both;
        }
        .content-wrap.visible { display: block; }

        .content-header {
            display: flex; align-items: center; gap: .6rem;
            margin-bottom: 1.2rem;
        }
        .content-header .shield {
            width: 40px; height: 40px; border-radius: 12px;
            background: #ecfdf5; display: flex; align-items: center;
            justify-content: center; font-size: 1.2rem;
        }
        .content-header h2 {
            font-family: 'DM Sans', sans-serif; font-size: 1.15rem; font-weight: 700;
        }
        .content-header span {
            font-size: .78rem; font-weight: 700; color: #10b981;
            background: #ecfdf5; padding: .15rem .6rem; border-radius: 50px;
            margin-left: auto;
        }

        .res-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: .7rem;
        }
        .res-card {
            background: var(--bg-white); border-radius: var(--radius-sm);
            padding: .8rem .6rem;
            box-shadow: var(--shadow-soft);
            border: 2px solid transparent;
            transition: all .35s cubic-bezier(.16,1,.3,1);
        }
        .res-card:hover {
            border-color: #e3e8d8; transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }
        .res-card a {
            text-decoration: none; display: flex; flex-direction: column; align-items: center; text-align: center; gap: .5rem; padding: .2rem 0;
        }
        .res-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .res-text { }
        .res-text h3 {
            font-family: 'DM Sans', sans-serif; font-size: .8rem;
            font-weight: 700; color: var(--text-dark); line-height: 1.25;
        }
        .res-text p {
            font-size: .65rem; font-weight: 600; color: var(--text-medium);
            margin-top: .15rem; line-height: 1.3;
        }
        .res-arrow { display: none; }

        .res-icon .ti { font-size: 1.2rem; }
        .res-card:nth-child(1) .res-icon { background: #fef3c7; }
        .res-card:nth-child(2) .res-icon { background: #dbeafe; }
        .res-card:nth-child(3) .res-icon { background: #fce7f3; }
        .res-card:nth-child(4) .res-icon { background: #ecfdf5; }
        .res-card:nth-child(5) .res-icon { background: #fef3c7; }
        .res-card:nth-child(6) .res-icon { background: #e0e7ff; }
        .res-card:nth-child(7) .res-icon { background: #f0fdfa; }
        .res-card:nth-child(8) .res-icon { background: #dbeafe; }
        .res-card:nth-child(9) .res-icon { background: #fce7f3; }
        .res-card:nth-child(10) .res-icon { background: #ecfdf5; }
        .res-card:nth-child(11) .res-icon { background: #fef3c7; }
        .res-card:nth-child(12) .res-icon { background: #dbeafe; }
        .res-card:nth-child(13) .res-icon { background: #fce7f3; }
        .res-card:nth-child(14) .res-icon { background: #ecfdf5; }
        .res-card:nth-child(15) .res-icon { background: #e0e7ff; }

        @media (max-width: 1024px) {
            .res-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .res-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .res-grid { grid-template-columns: 1fr; }
        }

        /* ═══ FOOTER ═══ */
        .site-footer { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 2rem; font-size: .8rem; font-weight: 700; color: var(--text-light); display: flex; flex-direction: column; gap: .75rem; }
        .footer-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem; }
        .footer-left { display: flex; align-items: center; gap: .5rem; }
        .footer-pulse { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(.8); } }

        @media (max-width: 520px) {
            .hero { padding: 1.5rem 1.25rem 2.5rem; }
            .hero-content { flex-direction: column; align-items: flex-start; }
            .hero-text h1 { font-size: 1.8rem; }
            .login-wrap, .content-wrap { padding: 0 1.25rem; }
            .login-card { padding: 2rem 1.4rem; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-shapes"><canvas class="hero-canvas" id="heroNet"></canvas></div>
        <div class="hero-content">
            <div class="hero-left">
                <div class="hero-icon"><i class="ti ti-lock"></i></div>
                <div class="hero-text">
                    <h1>Cruscotto</h1>
                    <p>Settimana · Giorno · Statistiche · Orario</p>
                </div>
            </div>
            <a href="index.html" class="back-btn">&larr; Torna al Portale</a>
        </div>
    </header>

    <!-- ═══ LOGIN ═══ -->
    <div class="login-wrap" id="loginWrap">
        <div class="login-card">
            <div class="login-lock"><i class="ti ti-lock-access" style="font-size:1.8rem;color:var(--accent)"></i></div>
            <h2>Cruscotto</h2>
            <p>Inserisci la password dell'area riservata</p>
            <div class="login-field">
                <input type="password" id="pwdInput" placeholder="Password..." autocomplete="off">
                <button id="pwdBtn">Accedi</button>
            </div>
            <div class="login-error" id="pwdError"></div>
        </div>
    </div>

    <!-- ═══ CONTENT (decrypted on login) ═══ -->
    <div class="content-wrap" id="contentWrap"></div>

    <footer class="site-footer">
        <div class="footer-top">
            <div class="footer-left"><div class="footer-pulse"></div><span>Andrea Cerioli &mdash; Animatore Digitale</span></div>
            <span>&copy; 2026 Andrea Cerioli — Scuola Sacra Famiglia. Tutti i diritti riservati.</span>
        </div>
    </footer>

                wrap.classList.add('visible');
                // innerHTML non esegue <script>: li ricreo manualmente
                var scripts = wrap.querySelectorAll('script');
                for (var i = 0; i < scripts.length; i++) {
                    var oldS = scripts[i];
                    var newS = document.createElement('script');
                    if (oldS.src) { newS.src = oldS.src; }
                    else { newS.textContent = oldS.textContent; }
                    oldS.parentNode.replaceChild(newS, oldS);
                }
            } catch (e) {
                err.textContent = 'Password non corretta. Riprova.';
                document.getElementById('pwdInput').value = '';
                document.getElementById('pwdInput').focus();
            }
        }

        document.getElementById('pwdBtn').addEventListener('click', tryDecrypt);
        document.getElementById('pwdInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') tryDecrypt();
        });
    </script>
<script>
(function(){
    var c=document.getElementById("heroNet");if(!c)return;
    var ctx=c.getContext("2d"),W,H;
    function resize(){c.width=c.parentElement.offsetWidth;c.height=c.parentElement.offsetHeight;W=c.width;H=c.height;}
    resize();window.addEventListener("resize",resize);
    var pts=[];for(var i=0;i<45;i++){pts.push({x:Math.random()*2000,y:Math.random()*400,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.2,r:Math.random()*1.5+.8,p:Math.random()*Math.PI*2});}
    function draw(){
        ctx.clearRect(0,0,W,H);var t=Date.now()*.001;
        for(var i=0;i<pts.length;i++){
            var a=pts[i];a.x+=a.vx;a.y+=a.vy;
            if(a.x<0||a.x>W)a.vx*=-1;if(a.y<0||a.y>H)a.vy*=-1;
            for(var j=i+1;j<pts.length;j++){
                var b=pts[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
                if(d<130){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
                ctx.strokeStyle="rgba(255,255,255,"+((1-d/130)*.12)+")";ctx.lineWidth=.5;ctx.stroke();}
            }
            var gl=.18+Math.sin(t*1.5+a.p)*.08;
            ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
            ctx.fillStyle="rgba(255,255,255,"+gl+")";ctx.fill();
        }
        requestAnimationFrame(draw);
    }
    draw();
})();
</script>
